<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>sam</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;font-family:'Outfit',sans-serif;overflow:hidden;background:#000;}

/* ═══════════════════════════════════
   VIDEO BACKGROUND
═══════════════════════════════════ */
#videobg{
  position:fixed;inset:0;z-index:0;
  width:100%;height:100%;
  object-fit:cover;
  filter:brightness(0.38) saturate(1.3);
}
/* layered overlays */
#overlay1{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at 50% 0%, rgba(80,120,255,0.08) 0%, transparent 60%),
             radial-gradient(ellipse at 50% 100%, rgba(120,60,200,0.07) 0%, transparent 60%);
}
#vignette{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse at 50% 38%, transparent 15%, rgba(0,0,0,0.82) 100%);
}
/* noise grain */
body::before{
  content:'';position:fixed;inset:0;z-index:3;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:0.03;mix-blend-mode:overlay;
}
/* subtle scanline */
body::after{
  content:'';position:fixed;inset:0;z-index:4;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.015) 2px,rgba(0,0,0,0.015) 4px);
}

/* ═══════════════════════════════════
   CUSTOM CURSOR
═══════════════════════════════════ */
*{cursor:none!important;}
#cur{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,0.95);
  position:fixed;z-index:9999;pointer-events:none;
  transform:translate(-50%,-50%);
  mix-blend-mode:difference;
  transition:width .12s,height .12s,opacity .12s;
}
#cur-trail{
  width:28px;height:28px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.2);
  position:fixed;z-index:9998;pointer-events:none;
  transform:translate(-50%,-50%);
  transition:left .12s ease,top .12s ease,opacity .3s;
  opacity:0.6;
}

/* ═══════════════════════════════════
   SPLASH — "click to enter"
═══════════════════════════════════ */
#splash{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:24px;
  transition:opacity 1s ease,transform 1s ease;
}
#splash.out{opacity:0;transform:scale(1.04);pointer-events:none;}

.spl-rings{
  position:relative;width:100px;height:100px;
  display:flex;align-items:center;justify-content:center;
}
.spl-rings span{
  position:absolute;border-radius:50%;
  animation:ringPulse 3.2s ease-in-out infinite;
}
.spl-rings span:nth-child(1){
  width:32px;height:32px;animation-delay:0s;
  border:1px solid rgba(255,255,255,0.5);
  box-shadow:0 0 10px rgba(255,255,255,0.1);
}
.spl-rings span:nth-child(2){
  width:56px;height:56px;animation-delay:.4s;
  border:1px solid rgba(255,255,255,0.2);
}
.spl-rings span:nth-child(3){
  width:82px;height:82px;animation-delay:.8s;
  border:1px solid rgba(255,255,255,0.08);
}
.spl-rings span:nth-child(4){
  width:100px;height:100px;animation-delay:1.1s;
  border:1px solid rgba(255,255,255,0.04);
}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.04);opacity:1}}
.spl-dot{
  width:11px;height:11px;border-radius:50%;
  background:#fff;
  box-shadow:0 0 16px rgba(255,255,255,0.9),0 0 36px rgba(255,255,255,0.4),0 0 60px rgba(160,180,255,0.2);
  animation:dotGlow 2.2s ease-in-out infinite;z-index:1;
}
@keyframes dotGlow{0%,100%{transform:scale(1);box-shadow:0 0 10px rgba(255,255,255,.7)}50%{transform:scale(1.35);box-shadow:0 0 24px rgba(255,255,255,1),0 0 50px rgba(255,255,255,.5),0 0 80px rgba(140,160,255,.3)}}
.spl-text{
  font-size:10px;font-weight:300;letter-spacing:7px;
  text-transform:uppercase;color:rgba(255,255,255,0.32);
  animation:breathe 2.8s ease-in-out infinite;
  user-select:none;
}
@keyframes breathe{0%,100%{opacity:.15}50%{opacity:1}}

/* ═══════════════════════════════════
   LOADER SCREEN
═══════════════════════════════════ */
#loader{
  position:fixed;inset:0;z-index:40;
  display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:0;
  opacity:0;transition:opacity .6s ease;
}
#loader.show{display:flex;}
#loader.fade-in{opacity:1;}
#loader.fade-out{opacity:0;pointer-events:none;}

.loader-av-wrap{
  position:relative;margin-bottom:24px;
  opacity:0;transform:translateY(18px) scale(0.88);
  transition:opacity .8s ease .1s,transform .8s cubic-bezier(.34,1.56,.64,1) .1s;
}
#loader.fade-in .loader-av-wrap{opacity:1;transform:translateY(0) scale(1);}

.loader-av-ring{
  position:absolute;inset:-5px;border-radius:50%;
  background:conic-gradient(from 0deg,rgba(255,255,255,0.75),rgba(180,200,255,0.1),rgba(255,255,255,0.75));
  animation:spinRing 2.2s linear infinite;
  filter:blur(0.5px);
}
.loader-av-ring::after{
  content:'';position:absolute;inset:3px;border-radius:50%;background:#000;
}
@keyframes spinRing{to{transform:rotate(360deg)}}

.loader-av-glow{
  position:absolute;inset:-18px;border-radius:50%;
  background:radial-gradient(circle,rgba(100,140,255,0.15) 0%,transparent 70%);
  animation:glowPulse 2.5s ease-in-out infinite;
}
@keyframes glowPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}

.loader-av-img{
  width:96px;height:96px;border-radius:50%;
  object-fit:cover;position:relative;z-index:1;
  display:block;
  border:2px solid rgba(255,255,255,0.12);
}
.loader-av-fb{
  width:96px;height:96px;border-radius:50%;
  background:linear-gradient(135deg,#0d1a3a,#2a4a8a);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;font-weight:800;color:#fff;
  position:relative;z-index:1;
  border:2px solid rgba(255,255,255,0.12);
}

.loader-name{
  font-size:38px;font-weight:800;color:#fff;
  letter-spacing:-1px;
  text-shadow:0 0 60px rgba(255,255,255,0.18);
  margin-bottom:30px;
  opacity:0;transform:translateY(12px);
  transition:opacity .7s ease .38s,transform .7s ease .38s;
}
#loader.fade-in .loader-name{opacity:1;transform:translateY(0);}

.loader-bar-wrap{
  width:140px;height:1px;
  background:rgba(255,255,255,0.08);
  border-radius:2px;overflow:hidden;
  opacity:0;transition:opacity .4s ease .6s;
}
#loader.fade-in .loader-bar-wrap{opacity:1;}
.loader-bar{
  height:100%;width:0%;
  background:linear-gradient(90deg,rgba(120,160,255,0.6),rgba(255,255,255,0.95));
  border-radius:2px;
  transition:width 1.8s cubic-bezier(.4,0,.2,1);
}
.loader-bar.go{width:100%;}

.loader-tag{
  margin-top:14px;
  font-size:9px;font-weight:300;letter-spacing:5px;
  text-transform:uppercase;color:rgba(255,255,255,0.18);
  opacity:0;transition:opacity .4s ease .75s;
}
#loader.fade-in .loader-tag{opacity:1;}

/* ═══════════════════════════════════
   MAIN BIO
═══════════════════════════════════ */
#main{
  position:fixed;inset:0;z-index:30;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 1.1s ease;
}
#main.show{opacity:1;pointer-events:all;}

/* avatar */
.av-outer{
  position:relative;margin-bottom:16px;
  animation:bob 6s ease-in-out infinite;
}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* glow ring behind avatar */
.av-glow{
  position:absolute;
  inset:-20px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(90,130,255,0.18) 0%,transparent 70%);
  animation:glowPulse 4s ease-in-out infinite;
  pointer-events:none;
}
.av-img{
  width:112px;height:112px;border-radius:50%;
  object-fit:cover;display:block;
  border:2px solid rgba(255,255,255,0.18);
  box-shadow:0 12px 48px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.04);
  position:relative;z-index:1;
}
.av-fb{
  width:112px;height:112px;border-radius:50%;
  background:linear-gradient(135deg,#0d1a3a,#2a4a8a);
  display:flex;align-items:center;justify-content:center;
  font-size:40px;font-weight:800;color:#fff;
  border:2px solid rgba(255,255,255,0.18);
  box-shadow:0 12px 48px rgba(0,0,0,0.7);
  position:relative;z-index:1;
}
.av-dot{
  position:absolute;bottom:6px;right:6px;
  width:20px;height:20px;border-radius:50%;
  background:#636b75;
  border:3.5px solid rgba(0,0,0,0.65);
  box-shadow:0 0 8px rgba(0,0,0,0.5);
  transition:background .4s,box-shadow .4s;
  z-index:2;
}
.av-dot.online{box-shadow:0 0 8px rgba(67,217,162,0.5);}

/* name */
.uname{
  font-size:36px;font-weight:800;color:#fff;letter-spacing:-0.8px;
  text-shadow:0 2px 30px rgba(0,0,0,0.5);
  margin-bottom:4px;
}
.uhandle{
  font-size:13px;font-weight:300;color:rgba(255,255,255,0.35);
  letter-spacing:1px;margin-bottom:20px;
}

/* presence pill */
.pill{
  display:flex;align-items:center;gap:12px;
  background:rgba(10,12,20,0.55);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:20px;padding:10px 14px 10px 10px;
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  min-width:265px;max-width:340px;
  margin-bottom:24px;
  opacity:0;transform:translateY(10px);
  transition:opacity .5s ease,transform .5s ease,border-color .3s;
  box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.04);
}
.pill:hover{border-color:rgba(255,255,255,0.13);}
.pill.visible{opacity:1;transform:translateY(0);}
.pill.gone{display:none;}

.pill-left{position:relative;flex-shrink:0;}
.pill-av{width:44px;height:44px;border-radius:50%;object-fit:cover;display:block;border:1.5px solid rgba(255,255,255,0.1);}
.pill-av-fb{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#0d1a3a,#2a4a8a);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#8899cc;border:1.5px solid rgba(255,255,255,0.07);}
.pill-dot{position:absolute;bottom:-1px;right:-1px;width:13px;height:13px;border-radius:50%;background:#636b75;border:2.5px solid rgba(10,12,20,0.8);transition:background .4s;}

.pill-mid{flex:1;min-width:0;}
.pill-top{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#fff;margin-bottom:3px;}
.pill-badge{
  font-size:8.5px;font-weight:600;letter-spacing:1.5px;
  padding:2px 6px;border-radius:5px;
  background:rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.45);
  text-transform:uppercase;
}
.pill-line1{font-size:11.5px;color:rgba(255,255,255,0.45);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pill-line1 b{color:rgba(255,255,255,0.78);font-weight:500;}
.pill-line2{display:flex;align-items:center;gap:5px;margin-top:2px;font-size:10.5px;color:rgba(255,255,255,0.32);}
.pill-line2-dot{width:6px;height:6px;border-radius:50%;background:#43d9a2;flex-shrink:0;box-shadow:0 0 6px rgba(67,217,162,0.6);}

.pill-right{
  width:48px;height:48px;border-radius:12px;flex-shrink:0;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;overflow:hidden;
}
.pill-right img{width:100%;height:100%;object-fit:cover;border-radius:11px;}

/* socials */
.socials{display:flex;align-items:center;gap:18px;margin-bottom:30px;}
.soc-btn{
  width:42px;height:42px;
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,0.35);text-decoration:none;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.03);
  transition:color .25s,transform .25s,border-color .25s,background .25s;
}
.soc-btn:hover{
  color:rgba(255,255,255,0.88);
  transform:translateY(-3px);
  border-color:rgba(255,255,255,0.18);
  background:rgba(255,255,255,0.07);
}
.soc-btn svg{width:20px;height:20px;}

/* views */
.views{
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:rgba(255,255,255,0.18);
  font-weight:300;letter-spacing:0.5px;
}
.views svg{width:13px;height:13px;}

/* stagger main children in */
#main > *{
  opacity:0;transform:translateY(12px);
  transition:opacity .6s ease,transform .6s ease;
}
#main.show > *:nth-child(1){transition-delay:.06s}
#main.show > *:nth-child(2){transition-delay:.13s}
#main.show > *:nth-child(3){transition-delay:.20s}
#main.show > *:nth-child(4){transition-delay:.27s}
#main.show > *:nth-child(5){transition-delay:.34s}
#main.show > *:nth-child(6){transition-delay:.41s}
#main.show > *{opacity:1;transform:translateY(0);}
</style>
</head>

<script>
/* ── CURSOR ── */
const cur = document.getElementById('cur');
const trail = document.getElementById('cur-trail');
let mx=0,my=0,tx=0,ty=0;
document.addEventListener('mousemove', e => {
  mx=e.clientX; my=e.clientY;
  cur.style.left=mx+'px'; cur.style.top=my+'px';
  setTimeout(()=>{ trail.style.left=mx+'px'; trail.style.top=my+'px'; },80);
});

/* ── STATUS ── */
const S_COL={online:'#43d9a2',idle:'#f0b232',dnd:'#f04747',offline:'#636b75'};
const S_LBL={online:'ONLINE',idle:'IDLE',dnd:'DND',offline:'OFFLINE'};

function setStatus(s){
  const col=S_COL[s]||S_COL.offline;
  const dot=document.getElementById('av-dot');
  dot.style.background=col;
  if(s==='online') dot.classList.add('online'); else dot.classList.remove('online');
  document.getElementById('pill-dot').style.background=col;
  const badge=document.getElementById('pill-badge');
  badge.textContent=S_LBL[s]||'OFFLINE';
  badge.style.color = s==='online' ? 'rgba(67,217,162,0.7)' :
                      s==='idle'   ? 'rgba(240,178,50,0.7)'  :
                      s==='dnd'    ? 'rgba(240,71,71,0.7)'   :
                      'rgba(255,255,255,0.35)';
}

function setAvatarEverywhere(url){
  ['av-img','loader-av','pill-av'].forEach((id,i)=>{
    const img=document.getElementById(id);
    const fb=document.getElementById(['av-fb','loader-fb','pill-av-fb'][i]);
    img.src=url;
    img.onload=()=>{ img.style.display='block'; if(fb) fb.style.display='none'; };
  });
}

/* ── STEP 1: splash ── */
function enterSplash(){
  document.getElementById('splash').classList.add('out');
  setTimeout(showLoader, 800);
}

/* ── STEP 2: loader ── */
function showLoader(){
  const loader=document.getElementById('loader');
  loader.classList.add('show');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    loader.classList.add('fade-in');
    setTimeout(()=>document.getElementById('loader-bar').classList.add('go'),120);
  }));
  loadPresence().then(()=>{
    setTimeout(goToMain, 2400);
  }).catch(()=>setTimeout(goToMain, 2400));
}

/* ── STEP 3: main bio ── */
function goToMain(){
  const loader=document.getElementById('loader');
  loader.classList.add('fade-out');
  setTimeout(()=>{
    loader.style.display='none';
    document.getElementById('main').classList.add('show');
  },700);
}

/* ── LANYARD / PRESENCE ── */
async function loadPresence(){
  try{
    const res=await fetch('/api/presence');
    const {data}=await res.json();
    if(!data) return;

    if(data.discord_user?.avatar){
      const url=`https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.webp?size=256`;
      setAvatarEverywhere(url);
    }

    setStatus(data.discord_status||'offline');

    const uname=data.discord_user?.global_name||data.discord_user?.username||'samplaysz';
    document.getElementById('pill-name').textContent=uname;

    const acts=data.activities||[];
    const act=acts.find(a=>a.type===0)||acts.find(a=>a.type===2)||acts[0];
    const pill=document.getElementById('pill');

    if(act){
      pill.classList.remove('gone');
      setTimeout(()=>pill.classList.add('visible'),350);
      const tmap={0:'Playing',1:'Streaming',2:'Listening to',3:'Watching',5:'Competing in'};
      document.getElementById('pill-line1').innerHTML=`<b>${tmap[act.type]||'Playing'}</b> ${act.name||''}`;
      const l2=document.getElementById('pill-line2');
      if(act.details||act.state){
        l2.innerHTML=`<span class="pill-line2-dot"></span>${act.details||act.state||''}`;
      }
      const icon=document.getElementById('pill-icon');
      if(act.application_id&&act.assets?.large_image){
        const img=document.createElement('img');
        img.src=`https://cdn.discordapp.com/app-assets/${act.application_id}/${act.assets.large_image}.webp?size=64`;
        img.onerror=()=>{ icon.textContent=act.type===2?'🎵':'🎮'; };
        icon.innerHTML=''; icon.appendChild(img);
      } else { icon.textContent=act.type===2?'🎵':'🎮'; }
    } else if(data.discord_status&&data.discord_status!=='offline'){
      pill.classList.remove('gone');
      setTimeout(()=>pill.classList.add('visible'),350);
      document.getElementById('pill-line1').innerHTML=`<b>${data.discord_status==='idle'?'Away':'Online'}</b>`;
      document.getElementById('pill-icon').textContent='👾';
    }
  }catch(e){ console.warn('Presence error:',e); }
}
</script>
