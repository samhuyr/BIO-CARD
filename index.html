<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>sam ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;font-family:'Outfit',sans-serif;overflow:hidden;background:#000;}
*{cursor:none!important;}

/* CURSOR */
#cur{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.9);position:fixed;z-index:9999;pointer-events:none;transform:translate(-50%,-50%);mix-blend-mode:difference;}
#cur-trail{width:24px;height:24px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);position:fixed;z-index:9998;pointer-events:none;transform:translate(-50%,-50%);transition:left .12s ease,top .12s ease;opacity:0.5;}

/* VIDEO BG */
#videobg{position:fixed;inset:0;z-index:0;width:100%;height:100%;object-fit:cover;filter:brightness(0.35) saturate(1.2) blur(0px);}
#vignette{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse at 50% 40%,transparent 10%,rgba(0,0,0,0.85) 100%);}
/* soft color wash */
#colorwash{position:fixed;inset:0;z-index:2;pointer-events:none;background:linear-gradient(135deg,rgba(80,40,120,0.12) 0%,rgba(20,60,120,0.08) 50%,rgba(80,20,80,0.1) 100%);}

/* SOUND BTN */
#sound-btn{position:fixed;top:20px;left:20px;z-index:300;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;cursor:pointer!important;color:rgba(255,255,255,0.45);transition:all .2s;}
#sound-btn.show{display:flex;}
#sound-btn:hover{color:rgba(255,255,255,0.9);border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);}
#sound-btn svg{width:14px;height:14px;}

/* ═══════════════════════════════
   SCREEN 1 — CLICK TO ENTER
═══════════════════════════════ */
#splash{
  position:fixed;inset:0;z-index:50;background:#000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0;
  transition:opacity 1s ease;
}
#splash.out{opacity:0;pointer-events:none;}

/* ambient orbs on splash */
.spl-orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;opacity:0;transition:opacity 2s ease;}
.spl-orb.show{opacity:1;}
.spl-orb1{width:400px;height:400px;background:radial-gradient(circle,rgba(100,60,180,0.25),transparent);top:-80px;left:-100px;}
.spl-orb2{width:350px;height:350px;background:radial-gradient(circle,rgba(40,80,180,0.2),transparent);bottom:-60px;right:-80px;}

.spl-eyebrow{
  font-size:9px;font-weight:300;letter-spacing:8px;
  color:rgba(255,255,255,0.2);text-transform:uppercase;
  margin-bottom:24px;
  opacity:0;transition:opacity 1s ease .2s;
}
#splash.ready .spl-eyebrow{opacity:1;}

.spl-name{
  font-size:64px;font-weight:800;color:#fff;
  letter-spacing:-2px;line-height:1;
  margin-bottom:48px;
  opacity:0;transform:translateY(16px);
  transition:opacity .9s ease .4s,transform .9s cubic-bezier(.34,1.2,.64,1) .4s;
  text-shadow:0 0 80px rgba(255,255,255,0.1);
}
#splash.ready .spl-name{opacity:1;transform:translateY(0);}

/* play button */
.spl-play-wrap{
  position:relative;width:72px;height:72px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:36px;cursor:pointer!important;
}
.spl-ring-outer{
  position:absolute;inset:0;border-radius:50%;
  border:1px solid rgba(255,255,255,0.08);
  animation:splRing 4s ease-in-out infinite;
}
.spl-ring-mid{
  position:absolute;inset:10px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.14);
  animation:splRing 4s ease-in-out infinite .6s;
}
@keyframes splRing{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.06);opacity:1}}
.spl-play-btn{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;
  backdrop-filter:blur(8px);
  transition:background .25s,border-color .25s,transform .25s;
  opacity:0;transition:opacity .8s ease .7s,background .25s,border-color .25s,transform .25s;
}
#splash.ready .spl-play-btn{opacity:1;}
.spl-play-btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.4);transform:scale(1.06);}
.spl-play-btn svg{width:14px;height:14px;fill:#fff;margin-left:2px;}

.spl-tap{
  font-size:10px;font-weight:400;letter-spacing:6px;
  color:rgba(255,255,255,0.5);text-transform:uppercase;
  margin-bottom:5px;
  opacity:0;animation:breathe 2.5s ease-in-out infinite;
  transition:opacity .8s ease .9s;
}
#splash.ready .spl-tap{opacity:1;}
@keyframes breathe{0%,100%{opacity:.3}50%{opacity:.8}}
.spl-sub{
  font-size:8px;font-weight:300;letter-spacing:4px;
  color:rgba(255,255,255,0.18);text-transform:uppercase;
  opacity:0;transition:opacity .8s ease 1.1s;
}
#splash.ready .spl-sub{opacity:1;}

/* ═══════════════════════════════
   SCREEN 2 — INTRO VIDEO
═══════════════════════════════ */
#intro-screen{
  position:fixed;inset:0;z-index:45;
  background:#000;
  display:none;opacity:0;
  transition:opacity .8s ease;
}
#intro-screen.show{display:block;}
#intro-screen.fade-in{opacity:1;}
#intro-screen.fade-out{opacity:0;pointer-events:none;}

#intro-vid{
  width:100%;height:100%;object-fit:cover;
  display:block;
}
/* skip hint */
.intro-skip{
  position:absolute;bottom:28px;right:28px;
  font-size:9px;font-weight:300;letter-spacing:4px;
  color:rgba(255,255,255,0.3);text-transform:uppercase;
  cursor:pointer!important;
  transition:color .2s;
  border:1px solid rgba(255,255,255,0.12);
  padding:7px 14px;border-radius:20px;
  backdrop-filter:blur(8px);
  background:rgba(0,0,0,0.3);
}
.intro-skip:hover{color:rgba(255,255,255,0.8);}

/* ═══════════════════════════════
   SCREEN 3 — IDENTITY REVEAL
═══════════════════════════════ */
#loader{
  position:fixed;inset:0;z-index:40;
  background:#000;
  display:none;opacity:0;
  align-items:center;justify-content:center;
  transition:opacity .8s ease;
  overflow:hidden;
}
#loader.show{display:flex;}
#loader.fade-in{opacity:1;}
#loader.fade-out{opacity:0;pointer-events:none;}

/* background particles */
.rv-particle{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,0.5);
  animation:particleDrift linear infinite;
  pointer-events:none;
}
@keyframes particleDrift{
  0%{transform:translateY(100vh) scale(0);opacity:0;}
  10%{opacity:1;}
  90%{opacity:.5;}
  100%{transform:translateY(-20px) scale(1);opacity:0;}
}

/* ambient glow */
.rv-glow{
  position:absolute;border-radius:50%;
  filter:blur(120px);pointer-events:none;
  animation:rvGlowPulse 6s ease-in-out infinite;
}
.rv-glow1{width:600px;height:600px;background:radial-gradient(circle,rgba(120,60,220,0.18),transparent);top:-100px;left:-150px;}
.rv-glow2{width:500px;height:500px;background:radial-gradient(circle,rgba(40,80,200,0.14),transparent);bottom:-80px;right:-120px;animation-delay:-3s;}
@keyframes rvGlowPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}

/* horizontal lines */
.rv-line{
  position:absolute;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.04),rgba(255,255,255,0.08),rgba(255,255,255,0.04),transparent);
  animation:rvLineScan 3s ease-in-out infinite;
}
.rv-line1{top:28%;}
.rv-line2{bottom:28%;animation-delay:-1.5s;}
@keyframes rvLineScan{0%,100%{opacity:0;transform:scaleX(0.3)}50%{opacity:1;transform:scaleX(1)}}

.rv-inner{
  display:flex;flex-direction:column;align-items:center;
  position:relative;z-index:1;
  text-align:center;padding:0 20px;
}

/* eyebrow */
.rv-eyebrow{
  font-size:8px;font-weight:300;letter-spacing:8px;
  color:rgba(255,255,255,0.15);text-transform:uppercase;
  margin-bottom:20px;
  opacity:0;transform:translateY(6px);
  transition:opacity .7s ease,transform .7s ease;
}
#loader.fade-in .rv-eyebrow{opacity:1;transform:translateY(0);}

/* big name — char by char reveal */
.rv-name{
  font-size:96px;font-weight:900;
  letter-spacing:-4px;line-height:1;
  margin-bottom:20px;
  overflow:hidden;
  background:linear-gradient(135deg,#fff 0%,rgba(210,190,255,0.85) 50%,#fff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.rv-name-char{
  display:inline-block;
  opacity:0;transform:translateY(60px) rotateX(40deg);
  transition:opacity .6s ease,transform .6s cubic-bezier(.34,1.3,.64,1);
}

/* divider */
.rv-divider{
  display:flex;align-items:center;gap:14px;
  margin-bottom:18px;
  opacity:0;transition:opacity .7s ease .6s;
  width:280px;
}
#loader.fade-in .rv-divider{opacity:1;}
.rv-divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);}
.rv-divider-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.3);flex-shrink:0;}

/* tagline */
.rv-tagline{
  font-size:13px;font-weight:300;
  color:rgba(255,255,255,0.35);
  letter-spacing:3px;
  margin-bottom:52px;
  opacity:0;transform:translateY(8px);
  transition:opacity .7s ease .75s,transform .7s ease .75s;
  font-style:italic;
}
#loader.fade-in .rv-tagline{opacity:1;transform:translateY(0);}

/* continue hint */
.rv-continue{
  font-size:8px;font-weight:300;letter-spacing:5px;
  color:rgba(255,255,255,0.15);text-transform:uppercase;
  opacity:0;
  animation:rvBreath 2s ease-in-out infinite;
  transition:opacity .6s ease 1.4s;
}
#loader.fade-in .rv-continue{opacity:1;}
@keyframes rvBreath{0%,100%{opacity:.1}50%{opacity:.4}}

/* ═══════════════════════════════
   SCREEN 4 — MAIN BIO
═══════════════════════════════ */
#main{
  position:fixed;inset:0;z-index:30;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 1.2s ease;
}
#main.show{opacity:1;pointer-events:all;}

.av-outer{position:relative;margin-bottom:16px;animation:bob 6s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}

/* soft dreamy glow */
.av-glow{
  position:absolute;inset:-28px;border-radius:50%;
  background:radial-gradient(circle,rgba(120,80,220,0.2) 0%,rgba(80,100,200,0.1) 40%,transparent 70%);
  animation:glowPulse 5s ease-in-out infinite;pointer-events:none;
}
@keyframes glowPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.12)}}

.av-img{width:116px;height:116px;border-radius:50%;object-fit:cover;display:block;border:2px solid rgba(255,255,255,0.15);box-shadow:0 16px 60px rgba(0,0,0,0.8),0 0 40px rgba(100,60,200,0.15);position:relative;z-index:1;}
.av-fb{width:116px;height:116px;border-radius:50%;background:linear-gradient(135deg,#0d1a3a,#2a4a8a);display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:800;color:#fff;border:2px solid rgba(255,255,255,0.15);box-shadow:0 16px 60px rgba(0,0,0,0.8);position:relative;z-index:1;}

#av-decoration{position:absolute;inset:-10px;z-index:3;width:calc(100% + 20px);height:calc(100% + 20px);pointer-events:none;display:none;}
.av-dot{position:absolute;bottom:7px;right:7px;width:20px;height:20px;border-radius:50%;background:#636b75;border:3.5px solid rgba(0,0,0,0.7);z-index:4;transition:background .4s;}

.uname{
  font-size:38px;font-weight:800;color:#fff;letter-spacing:-0.8px;
  margin-bottom:5px;
  background:linear-gradient(135deg,#fff 0%,rgba(200,180,255,0.9) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.uhandle{font-size:12px;font-weight:300;color:rgba(255,255,255,0.3);letter-spacing:2px;margin-bottom:22px;}

/* discord presence row */
.dc-row{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:16px;
  padding:10px 16px 10px 10px;
  backdrop-filter:blur(24px);
  margin-bottom:24px;min-width:240px;max-width:320px;
  opacity:0;transform:translateY(8px);
  transition:opacity .5s ease,transform .5s ease;
  box-shadow:0 8px 32px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.04);
}
.dc-row.visible{opacity:1;transform:translateY(0);}
.dc-row.gone{display:none;}

.dc-av-wrap{position:relative;flex-shrink:0;}
.dc-av{width:42px;height:42px;border-radius:50%;object-fit:cover;display:block;border:1.5px solid rgba(255,255,255,0.1);}
.dc-av-fb{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#0d1a3a,#2a4a8a);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#8899cc;}
.dc-dot{position:absolute;bottom:-1px;right:-1px;width:12px;height:12px;border-radius:50%;background:#636b75;border:2.5px solid rgba(0,0,0,0.8);transition:background .4s;}

.dc-info{flex:1;min-width:0;}
.dc-name-row{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
.dc-uname{font-size:13px;font-weight:600;color:#fff;}
.dc-badge{font-size:8px;font-weight:600;letter-spacing:1.5px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.35);text-transform:uppercase;}
.dc-activity{font-size:11px;color:rgba(255,255,255,0.38);font-weight:300;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* socials — soft pill style */
.socials{display:flex;align-items:center;gap:14px;margin-bottom:28px;}
.soc-btn{
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,0.38);text-decoration:none;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(8px);
  transition:all .25s ease;
}
.soc-btn:hover{color:#fff;transform:translateY(-4px);border-color:rgba(180,140,255,0.3);background:rgba(140,100,255,0.1);box-shadow:0 8px 24px rgba(120,80,220,0.2);}
.soc-btn svg{width:19px;height:19px;}

.views{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,0.18);font-weight:300;}
.views svg{width:13px;height:13px;}

/* stagger */
#main > *{opacity:0;transform:translateY(14px);transition:opacity .65s ease,transform .65s ease;}
#main.show > *:nth-child(1){transition-delay:.05s}
#main.show > *:nth-child(2){transition-delay:.12s}
#main.show > *:nth-child(3){transition-delay:.19s}
#main.show > *:nth-child(4){transition-delay:.26s}
#main.show > *:nth-child(5){transition-delay:.33s}
#main.show > *:nth-child(6){transition-delay:.40s}
#main.show > *{opacity:1;transform:translateY(0);}

.inspired{
  font-size:9px;font-weight:300;letter-spacing:2px;
  color:rgba(255,255,255,0.1);
  margin-top:10px;
}
.inspired a{color:rgba(255,255,255,0.18);text-decoration:none;transition:color .2s;}
.inspired a:hover{color:rgba(255,255,255,0.5);}
</style>
</head>
<body>

<video id="videobg" autoplay muted loop playsinline>
  <source src="bg.mp4" type="video/mp4"/>
</video>
<div id="vignette"></div>
<div id="colorwash"></div>
<div id="cur"></div>
<div id="cur-trail"></div>

<!-- SOUND BTN -->
<div id="sound-btn" onclick="toggleSound()">
  <svg id="icon-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
  <svg id="icon-unmuted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
</div>

<!-- ── SCREEN 1: SPLASH ── -->
<div id="splash">
  <div class="spl-orb spl-orb1"></div>
  <div class="spl-orb spl-orb2"></div>
  <div class="spl-eyebrow">welcome to my space</div>
  <div class="spl-name">Sam</div>
  <div class="spl-play-wrap" onclick="enterSplash()">
    <div class="spl-ring-outer"></div>
    <div class="spl-ring-mid"></div>
    <div class="spl-play-btn">
      <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    </div>
  </div>
  <div class="spl-tap">tap to enter</div>
  <div class="spl-sub">experience awaits</div>
</div>

<!-- ── SCREEN 2: INTRO VIDEO ── -->
<div id="intro-screen">
  <video id="intro-vid" playsinline>
    <source src="intro.mp4" type="video/mp4"/>
  </video>
  <div class="intro-skip" onclick="skipIntro()">skip ›</div>
</div>

<!-- ── SCREEN 3: IDENTITY REVEAL ── -->
<div id="loader">
  <div class="rv-glow rv-glow1"></div>
  <div class="rv-glow rv-glow2"></div>
  <div class="rv-line rv-line1"></div>
  <div class="rv-line rv-line2"></div>
  <div class="rv-inner">
    <div class="rv-eyebrow">you just found</div>
    <div class="rv-name" id="rv-name">
      <span class="rv-name-char">S</span><span class="rv-name-char">a</span><span class="rv-name-char">m</span>
    </div>
    <div class="rv-divider">
      <div class="rv-divider-line"></div>
      <div class="rv-divider-dot"></div>
      <div class="rv-divider-line"></div>
    </div>
    <div class="rv-tagline">don't search me up.</div>
    <div class="rv-continue">entering in a moment</div>
  </div>
</div>

<!-- ── SCREEN 4: MAIN BIO ── -->
<div id="main">
  <div class="av-outer">
    <div class="av-glow"></div>
    <img class="av-img" id="av-img" alt="" style="display:none"/>
    <div class="av-fb" id="av-fb">S</div>
    <img id="av-decoration" alt=""/>
    <div class="av-dot" id="av-dot"></div>
  </div>

  <div class="uname">Sam</div>
  <div class="uhandle">@samplaysz</div>

  <div class="dc-row gone" id="dc-row">
    <div class="dc-av-wrap">
      <img class="dc-av" id="dc-av" alt="" style="display:none"/>
      <div class="dc-av-fb" id="dc-av-fb">S</div>
      <div class="dc-dot" id="dc-dot"></div>
    </div>
    <div class="dc-info">
      <div class="dc-name-row">
        <span class="dc-uname" id="dc-uname">samplaysz</span>
        <span class="dc-badge" id="dc-badge">ONLINE</span>
      </div>
      <div class="dc-activity" id="dc-activity">Doing Nothing</div>
    </div>
  </div>

  <div class="socials">
    <a class="soc-btn" href="https://discord.com/users/864213870494220341" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
    </a>
    <a class="soc-btn" href="https://instagram.com/samplayszz" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5.5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/></svg>
    </a>
    <a class="soc-btn" href="https://github.com/samhuyr" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>

  <div class="views">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    <span id="view-count">—</span>
  </div>

  <div class="inspired">
    inspired by <a href="https://msedge.elricc.site/" target="_blank">msedge</a>
  </div>
</div>

<script>
/* CURSOR */
const cur=document.getElementById('cur');
const trail=document.getElementById('cur-trail');
document.addEventListener('mousemove',e=>{
  cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';
  setTimeout(()=>{trail.style.left=e.clientX+'px';trail.style.top=e.clientY+'px';},90);
});

/* SOUND */
let muted=false;
const vid=document.getElementById('videobg');
function toggleSound(){
  muted=!muted;vid.muted=muted;
  document.getElementById('icon-muted').style.display=muted?'block':'none';
  document.getElementById('icon-unmuted').style.display=muted?'none':'block';
}

/* STATUS */
const S_COL={online:'#43d9a2',idle:'#f0b232',dnd:'#f04747',offline:'#636b75'};
const S_LBL={online:'ONLINE',idle:'IDLE',dnd:'DND',offline:'OFFLINE'};
const S_TCOL={online:'rgba(67,217,162,0.8)',idle:'rgba(240,178,50,0.8)',dnd:'rgba(240,71,71,0.8)',offline:'rgba(255,255,255,0.28)'};

function setStatus(s){
  const col=S_COL[s]||S_COL.offline;
  document.getElementById('av-dot').style.background=col;
  document.getElementById('dc-dot').style.background=col;
  const b=document.getElementById('dc-badge');
  b.textContent=S_LBL[s]||'OFFLINE';
  b.style.color=S_TCOL[s]||S_TCOL.offline;
}

function setFavicon(url){
  const c=document.createElement('canvas');c.width=64;c.height=64;
  const ctx=c.getContext('2d');
  const img=new Image();img.crossOrigin='anonymous';
  img.onload=()=>{
    ctx.beginPath();ctx.arc(32,32,32,0,Math.PI*2);ctx.clip();
    ctx.drawImage(img,0,0,64,64);
    const l=document.getElementById('fav')||document.createElement('link');
    l.id='fav';l.rel='icon';l.type='image/png';l.href=c.toDataURL();
    document.head.appendChild(l);
  };img.src=url;
}

function setAvatarEverywhere(url){
  ['av-img','loader-av','dc-av'].forEach((id,i)=>{
    const img=document.getElementById(id);
    const fb=document.getElementById(['av-fb','loader-fb','dc-av-fb'][i]);
    img.src=url;
    img.onload=()=>{img.style.display='block';if(fb)fb.style.display='none';};
  });
  setFavicon(url);
}

function applyPresence(data){
  if(!data)return;
  if(data.discord_user?.avatar){
    const url=`https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.webp?size=256`;
    setAvatarEverywhere(url);
  }
  if(data.decoration){
    const dec=document.getElementById('av-decoration');
    dec.src=data.decoration;dec.style.display='block';
  }
  setStatus(data.discord_status||'offline');
  const uname=data.discord_user?.global_name||data.discord_user?.username||'samplaysz';
  document.getElementById('dc-uname').textContent=uname;
  updateActivity(data);
}

function updateActivity(data){
  const acts=data.activities||[];
  const act=acts.find(a=>a.type===0)||acts.find(a=>a.type===2)||acts[0];
  const row=document.getElementById('dc-row');
  const tmap={0:'Playing',1:'Streaming',2:'Listening to',3:'Watching',5:'Competing in'};
  if(act){
    row.classList.remove('gone');
    setTimeout(()=>row.classList.add('visible'),300);
    document.getElementById('dc-activity').textContent=`${tmap[act.type]||'Playing'} ${act.name||''}`;
  } else if(data.discord_status&&data.discord_status!=='offline'){
    row.classList.remove('gone');
    setTimeout(()=>row.classList.add('visible'),300);
    document.getElementById('dc-activity').textContent='Doing Nothing';
  } else {
    row.classList.add('gone');row.classList.remove('visible');
  }
}

/* ── SPLASH INIT ── */
setTimeout(()=>{
  document.getElementById('splash').classList.add('ready');
  document.querySelectorAll('.spl-orb').forEach(o=>o.classList.add('show'));
},120);

/* ── STEP 1: ENTER ── */
function enterSplash(){
  // fullscreen
  const el=document.documentElement;
  if(el.requestFullscreen)el.requestFullscreen();
  else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();

  // unlock bg video sound
  vid.muted=false;vid.volume=0.35;vid.play();
  document.getElementById('sound-btn').classList.add('show');
  document.getElementById('splash').classList.add('out');
  setTimeout(showIntro,900);
}

/* ── STEP 2: INTRO VIDEO ── */
function showIntro(){
  const screen=document.getElementById('intro-screen');
  const introVid=document.getElementById('intro-vid');
  screen.classList.add('show');
  requestAnimationFrame(()=>requestAnimationFrame(()=>screen.classList.add('fade-in')));

  // mute bg, play intro at full volume
  vid.volume=0;
  introVid.volume=1;
  introVid.play();

  introVid.onended=()=>finishIntro();
}

function skipIntro(){
  document.getElementById('intro-vid').pause();
  finishIntro();
}

function finishIntro(){
  const screen=document.getElementById('intro-screen');
  screen.classList.add('fade-out');
  // restore bg volume
  vid.volume=0.35;
  setTimeout(()=>{screen.style.display='none';showLoader();},800);
}

/* ── STEP 3: IDENTITY REVEAL ── */
function spawnParticles(){
  const loader=document.getElementById('loader');
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='rv-particle';
    const size=Math.random()*3+1;
    p.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;animation-duration:${Math.random()*8+6}s;animation-delay:${Math.random()*6}s;opacity:${Math.random()*0.4+0.1}`;
    loader.appendChild(p);
  }
}

function revealNameChars(){
  const chars=document.querySelectorAll('.rv-name-char');
  chars.forEach((c,i)=>{
    setTimeout(()=>{
      c.style.opacity=1;
      c.style.transform='translateY(0) rotateX(0deg)';
    },400+i*120);
  });
}

function showLoader(){
  const loader=document.getElementById('loader');
  loader.classList.add('show');
  spawnParticles();
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    loader.classList.add('fade-in');
    setTimeout(revealNameChars, 200);
  }));

  loadPresenceOnce()
    .then(()=>setTimeout(goToMain,3200))
    .catch(()=>setTimeout(goToMain,3200));
}

/* ── STEP 4: MAIN BIO ── */
function goToMain(){
  const loader=document.getElementById('loader');
  loader.classList.add('fade-out');
  setTimeout(()=>{
    loader.style.display='none';
    document.getElementById('main').classList.add('show');
    startWebSocket();
  },800);
}

/* ── PRESENCE FETCH ── */
async function loadPresenceOnce(){
  const res=await fetch('/api/presence');
  const json=await res.json();
  applyPresence({...json.data,decoration:json.decoration});
}

/* ── WEBSOCKET REAL-TIME ── */
function startWebSocket(){
  const ws=new WebSocket('wss://api.lanyard.rest/socket');
  let hb;
  ws.onopen=()=>ws.send(JSON.stringify({op:2,d:{subscribe_to_id:'864213870494220341'}}));
  ws.onmessage=e=>{
    const msg=JSON.parse(e.data);
    if(msg.op===1){hb=setInterval(()=>ws.send(JSON.stringify({op:3})),msg.d.heartbeat_interval);}
    if(msg.op===0){if(msg.d.discord_status)setStatus(msg.d.discord_status);if(msg.d.activities!==undefined)updateActivity(msg.d);}
  };
  ws.onclose=()=>{clearInterval(hb);setTimeout(startWebSocket,3000);};
}

/* ── VIEW COUNT ── */
async function loadViews(){
  try{
    const r=await fetch('https://api.counterapi.dev/v1/samplaysz-bio/views/up');
    const d=await r.json();
    document.getElementById('view-count').textContent=d.count?.toLocaleString()||'1';
  }catch(e){document.getElementById('view-count').textContent='1';}
}
loadViews();
</script>
</body>
