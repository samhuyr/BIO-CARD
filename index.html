<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>sam ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;font-family:'Outfit',sans-serif;overflow:hidden;background:#000;}
*{cursor:none!important;}

/* CURSOR */
#cur{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.9);position:fixed;z-index:9999;pointer-events:none;transform:translate(-50%,-50%);mix-blend-mode:difference;}
#cur-trail{width:24px;height:24px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);position:fixed;z-index:9998;pointer-events:none;transform:translate(-50%,-50%);transition:left .12s ease,top .12s ease;opacity:0.5;}

/* VIDEO BG */
#videobg{position:fixed;inset:0;z-index:0;width:100%;height:100%;object-fit:cover;filter:brightness(0.35) saturate(1.2) blur(0px);}
#vignette{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse at 50% 40%,transparent 10%,rgba(0,0,0,0.85) 100%);}
/* soft color wash */
#colorwash{position:fixed;inset:0;z-index:2;pointer-events:none;background:linear-gradient(135deg,rgba(80,40,120,0.12) 0%,rgba(20,60,120,0.08) 50%,rgba(80,20,80,0.1) 100%);}

/* SOUND BTN */
#sound-btn{position:fixed;top:20px;left:20px;z-index:300;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;cursor:pointer!important;color:rgba(255,255,255,0.45);transition:all .2s;}
#sound-btn.show{display:flex;}
#sound-btn:hover{color:rgba(255,255,255,0.9);border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);}
#sound-btn svg{width:14px;height:14px;}

/* ═══════════════════════════════
   SCREEN 1 — CLICK TO ENTER
═══════════════════════════════ */
#splash{
  position:fixed;inset:0;z-index:50;background:#000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0;
  transition:opacity 1s ease;
}
#splash.out{opacity:0;pointer-events:none;}

/* ambient orbs on splash */
.spl-orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;opacity:0;transition:opacity 2s ease;}
.spl-orb.show{opacity:1;}
.spl-orb1{width:400px;height:400px;background:radial-gradient(circle,rgba(100,60,180,0.25),transparent);top:-80px;left:-100px;}
.spl-orb2{width:350px;height:350px;background:radial-gradient(circle,rgba(40,80,180,0.2),transparent);bottom:-60px;right:-80px;}

.spl-eyebrow{
  font-size:9px;font-weight:300;letter-spacing:8px;
  color:rgba(255,255,255,0.2);text-transform:uppercase;
  margin-bottom:24px;
  opacity:0;transition:opacity 1s ease .2s;
}
#splash.ready .spl-eyebrow{opacity:1;}

.spl-name{
  font-size:64px;font-weight:800;color:#fff;
  letter-spacing:-2px;line-height:1;
  margin-bottom:48px;
  opacity:0;transform:translateY(16px);
  transition:opacity .9s ease .4s,transform .9s cubic-bezier(.34,1.2,.64,1) .4s;
  text-shadow:0 0 80px rgba(255,255,255,0.1);
}
#splash.ready .spl-name{opacity:1;transform:translateY(0);}

/* play button */
.spl-play-wrap{
  position:relative;width:72px;height:72px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:36px;cursor:pointer!important;
}
.spl-ring-outer{
  position:absolute;inset:0;border-radius:50%;
  border:1px solid rgba(255,255,255,0.08);
  animation:splRing 4s ease-in-out infinite;
}
.spl-ring-mid{
  position:absolute;inset:10px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.14);
  animation:splRing 4s ease-in-out infinite .6s;
}
@keyframes splRing{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.06);opacity:1}}
.spl-play-btn{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;
  backdrop-filter:blur(8px);
  transition:background .25s,border-color .25s,transform .25s;
  opacity:0;transition:opacity .8s ease .7s,background .25s,border-color .25s,transform .25s;
}
#splash.ready .spl-play-btn{opacity:1;}
.spl-play-btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.4);transform:scale(1.06);}
.spl-play-btn svg{width:14px;height:14px;fill:#fff;margin-left:2px;}

.spl-tap{
  font-size:10px;font-weight:400;letter-spacing:6px;
  color:rgba(255,255,255,0.5);text-transform:uppercase;
  margin-bottom:5px;
  opacity:0;animation:breathe 2.5s ease-in-out infinite;
  transition:opacity .8s ease .9s;
}
#splash.ready .spl-tap{opacity:1;}
@keyframes breathe{0%,100%{opacity:.3}50%{opacity:.8}}
.spl-sub{
  font-size:8px;font-weight:300;letter-spacing:4px;
  color:rgba(255,255,255,0.18);text-transform:uppercase;
  opacity:0;transition:opacity .8s ease 1.1s;
}
#splash.ready .spl-sub{opacity:1;}

/* ═══════════════════════════════
   SCREEN 2 — INTRO GIF
═══════════════════════════════ */
#intro-screen{
  position:fixed;inset:0;z-index:45;
  background:#000;
  display:none;opacity:0;
  transition:opacity .8s ease;
  overflow:hidden;
}
#intro-screen.show{display:block;}
#intro-screen.fade-in{opacity:1;}
#intro-screen.fade-out{opacity:0;pointer-events:none;}

#intro-gif{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  filter:contrast(1.1) saturate(1.15);
}
/* red scanline overlay to match the aesthetic */
#intro-screen::before{
  content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0.08) 0px,rgba(0,0,0,0.08) 1px,transparent 1px,transparent 3px);
}
/* red vignette matching gif colors */
#intro-screen::after{
  content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(20,0,0,0.75) 100%);
}
.intro-skip{
  position:absolute;bottom:28px;right:28px;z-index:10;
  font-size:9px;font-weight:300;letter-spacing:4px;
  color:rgba(255,255,255,0.35);text-transform:uppercase;
  cursor:pointer!important;
  transition:color .2s,border-color .2s;
  border:1px solid rgba(255,80,80,0.2);
  padding:7px 16px;border-radius:20px;
  backdrop-filter:blur(8px);
  background:rgba(0,0,0,0.4);
}
.intro-skip:hover{color:rgba(255,100,100,0.9);border-color:rgba(255,80,80,0.5);}
/* duration bar at bottom */
.intro-bar-wrap{
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  height:2px;background:rgba(255,255,255,0.06);
}
.intro-bar{
  height:100%;width:0%;
  background:linear-gradient(90deg,rgba(200,30,30,0.8),rgba(255,80,50,0.9));
  transition:width linear;
}

/* ═══════════════════════════════
   SCREEN 3 — IDENTITY REVEAL
═══════════════════════════════ */
#loader{
  position:fixed;inset:0;z-index:40;
  background:#000;
  display:none;opacity:0;
  align-items:center;justify-content:center;
  transition:opacity .8s ease;
  overflow:hidden;
}
#loader.show{display:flex;}
#loader.fade-in{opacity:1;}
#loader.fade-out{opacity:0;pointer-events:none;}

/* ═══════════════════════════════
   SCREEN 3 — CINEMATIC LOADER
═══════════════════════════════ */
#loader{
  position:fixed;inset:0;z-index:40;
  background:#000;
  display:none;opacity:0;
  align-items:center;justify-content:center;
  transition:opacity .8s ease;
  overflow:hidden;
}
#loader.show{display:flex;}
#loader.fade-in{opacity:1;}
#loader.fade-out{opacity:0;pointer-events:none;}

/* scanlines */
#loader::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,rgba(255,255,255,0.02) 0px,rgba(255,255,255,0.02) 1px,transparent 1px,transparent 4px);
}

/* ambient glow */
.rv-glow{position:absolute;border-radius:50%;filter:blur(130px);pointer-events:none;animation:rvGlowPulse 6s ease-in-out infinite;}
.rv-glow1{width:500px;height:500px;background:radial-gradient(circle,rgba(100,50,200,0.2),transparent);top:-120px;left:-120px;}
.rv-glow2{width:450px;height:450px;background:radial-gradient(circle,rgba(30,60,180,0.16),transparent);bottom:-100px;right:-100px;animation-delay:-3s;}
@keyframes rvGlowPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}

/* HUD corner brackets */
.hud-corner{position:absolute;width:50px;height:50px;pointer-events:none;}
.hud-corner::before,.hud-corner::after{content:'';position:absolute;background:rgba(255,255,255,0.18);}
.hud-corner::before{width:1px;height:100%;}
.hud-corner::after{width:100%;height:1px;}
.hud-tl{top:24px;left:24px;} .hud-tl::before{top:0;left:0;} .hud-tl::after{top:0;left:0;}
.hud-tr{top:24px;right:24px;transform:scaleX(-1);}
.hud-bl{bottom:24px;left:24px;transform:scaleY(-1);}
.hud-br{bottom:24px;right:24px;transform:scale(-1,-1);}

/* HUD text labels */
.hud-label{
  position:absolute;font-size:8px;font-weight:400;letter-spacing:3px;
  color:rgba(255,255,255,0.18);text-transform:uppercase;pointer-events:none;
}
.hud-tl-txt{top:28px;left:82px;}
.hud-tr-txt{top:28px;right:82px;text-align:right;}
.hud-bl-txt{bottom:28px;left:82px;}
.hud-br-txt{bottom:28px;right:82px;text-align:right;}

/* horizontal scan line */
.rv-line{
  position:absolute;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),rgba(255,255,255,0.1),rgba(255,255,255,0.06),transparent);
  animation:rvLineScan 3s ease-in-out infinite;
}
.rv-line1{top:28%;}
.rv-line2{bottom:28%;animation-delay:-1.5s;}
@keyframes rvLineScan{0%,100%{opacity:0;transform:scaleX(.3)}50%{opacity:1;transform:scaleX(1)}}

/* floating particles */
.rv-particle{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,0.6);
  animation:particleDrift linear infinite;pointer-events:none;
}
@keyframes particleDrift{
  0%{transform:translateY(100vh) scale(0);opacity:0;}
  10%{opacity:1;}90%{opacity:.4;}
  100%{transform:translateY(-20px) scale(1);opacity:0;}
}

/* center content */
.rv-inner{
  display:flex;flex-direction:column;align-items:center;
  position:relative;z-index:1;text-align:center;padding:0 20px;
}

/* avatar in loader */
.rv-av-wrap{
  position:relative;width:86px;height:86px;margin-bottom:24px;
  opacity:0;transform:scale(0.8) translateY(10px);
  transition:opacity .8s ease .1s,transform .8s cubic-bezier(.34,1.4,.64,1) .1s;
}
#loader.fade-in .rv-av-wrap{opacity:1;transform:scale(1) translateY(0);}
.rv-av-ring{
  position:absolute;inset:-3px;border-radius:50%;
  background:conic-gradient(from 0deg,rgba(180,130,255,0.9),rgba(80,120,255,0.2),rgba(180,130,255,0.9));
  animation:spinRing 2.5s linear infinite;
}
.rv-av-ring::after{content:'';position:absolute;inset:3px;border-radius:50%;background:#000;}
@keyframes spinRing{to{transform:rotate(360deg)}}
.rv-av-img{width:86px;height:86px;border-radius:50%;object-fit:cover;position:relative;z-index:1;display:block;}
.rv-av-fb{width:86px;height:86px;border-radius:50%;background:linear-gradient(135deg,#1a2a5a,#3a5aaa);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#fff;position:relative;z-index:1;}

/* eyebrow */
.rv-eyebrow{
  font-size:8px;font-weight:300;letter-spacing:8px;
  color:rgba(255,255,255,0.2);text-transform:uppercase;
  margin-bottom:12px;
  opacity:0;transform:translateY(6px);
  transition:opacity .7s ease .3s,transform .7s ease .3s;
}
#loader.fade-in .rv-eyebrow{opacity:1;transform:translateY(0);}

/* big name */
.rv-name{
  font-size:88px;font-weight:900;letter-spacing:-4px;line-height:1;
  margin-bottom:18px;overflow:hidden;
  background:linear-gradient(135deg,#fff 0%,rgba(200,170,255,0.85) 50%,#fff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.rv-name-char{
  display:inline-block;
  opacity:0;transform:translateY(55px) rotateX(35deg);
  transition:opacity .55s ease,transform .55s cubic-bezier(.34,1.3,.64,1);
}

/* divider */
.rv-divider{
  display:flex;align-items:center;gap:14px;margin-bottom:14px;
  opacity:0;transition:opacity .7s ease .65s;width:260px;
}
#loader.fade-in .rv-divider{opacity:1;}
.rv-divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);}
.rv-divider-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.3);flex-shrink:0;}

/* tagline */
.rv-tagline{
  font-size:12px;font-weight:300;color:rgba(255,255,255,0.3);
  letter-spacing:3px;margin-bottom:28px;
  opacity:0;transform:translateY(8px);
  transition:opacity .7s ease .8s,transform .7s ease .8s;font-style:italic;
}
#loader.fade-in .rv-tagline{opacity:1;transform:translateY(0);}

/* progress bar */
.rv-bar-wrap{
  width:160px;height:1.5px;background:rgba(255,255,255,0.07);
  border-radius:2px;overflow:hidden;margin-bottom:14px;
  opacity:0;transition:opacity .4s ease 1s;
}
#loader.fade-in .rv-bar-wrap{opacity:1;}
.rv-bar{height:100%;width:0%;background:linear-gradient(90deg,rgba(140,100,255,0.7),rgba(255,255,255,0.95));transition:width 2.4s cubic-bezier(.4,0,.2,1);}
.rv-bar.go{width:100%;}

/* status text */
.rv-status-txt{
  font-size:8px;font-weight:300;letter-spacing:4px;
  color:rgba(255,255,255,0.18);text-transform:uppercase;
  opacity:0;transition:opacity .4s ease 1.1s;
  animation:rvBreath 2s ease-in-out infinite;
}
#loader.fade-in .rv-status-txt{opacity:1;}
@keyframes rvBreath{0%,100%{opacity:.1}50%{opacity:.45}}

/* ═══════════════════════════════
   SCREEN 4 — MAIN BIO
═══════════════════════════════ */
#main{
  position:fixed;inset:0;z-index:30;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 1.2s ease;
}
#main.show{opacity:1;pointer-events:all;}

.av-outer{position:relative;margin-bottom:16px;animation:bob 6s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}

/* soft dreamy glow */
.av-glow{
  position:absolute;inset:-28px;border-radius:50%;
  background:radial-gradient(circle,rgba(120,80,220,0.2) 0%,rgba(80,100,200,0.1) 40%,transparent 70%);
  animation:glowPulse 5s ease-in-out infinite;pointer-events:none;
}
@keyframes glowPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.12)}}

.av-img{width:116px;height:116px;border-radius:50%;object-fit:cover;display:block;border:2px solid rgba(255,255,255,0.15);box-shadow:0 16px 60px rgba(0,0,0,0.8),0 0 40px rgba(100,60,200,0.15);position:relative;z-index:1;}
.av-fb{width:116px;height:116px;border-radius:50%;background:linear-gradient(135deg,#0d1a3a,#2a4a8a);display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:800;color:#fff;border:2px solid rgba(255,255,255,0.15);box-shadow:0 16px 60px rgba(0,0,0,0.8);position:relative;z-index:1;}

#av-decoration{position:absolute;inset:-10px;z-index:3;width:calc(100% + 20px);height:calc(100% + 20px);pointer-events:none;display:none;}
.av-dot{position:absolute;bottom:7px;right:7px;width:20px;height:20px;border-radius:50%;background:#636b75;border:3.5px solid rgba(0,0,0,0.7);z-index:4;transition:background .4s;}

.uname{
  font-size:38px;font-weight:800;color:#fff;letter-spacing:-0.8px;
  margin-bottom:5px;
  background:linear-gradient(135deg,#fff 0%,rgba(200,180,255,0.9) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.uhandle{font-size:12px;font-weight:300;color:rgba(255,255,255,0.3);letter-spacing:2px;margin-bottom:14px;}

/* ── DISCORD BADGES ── */
.badges-row{
  display:flex;align-items:center;justify-content:center;
  flex-wrap:wrap;gap:6px;
  margin-bottom:18px;
  min-height:28px;
}
.badge-icon{
  width:26px;height:26px;
  border-radius:6px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  transition:transform .2s,border-color .2s;
  cursor:default;
}
.badge-icon:hover{transform:translateY(-3px) scale(1.15);border-color:rgba(255,255,255,0.2);}
.badge-icon img{width:18px;height:18px;object-fit:contain;}
/* tooltip */
.badge-icon::after{
  content:attr(data-tip);
  position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.85);color:rgba(255,255,255,0.85);
  font-size:9px;font-weight:400;letter-spacing:.5px;
  white-space:nowrap;padding:4px 8px;border-radius:6px;
  border:1px solid rgba(255,255,255,0.08);
  opacity:0;pointer-events:none;
  transition:opacity .15s;
  backdrop-filter:blur(8px);
}
.badge-icon:hover::after{opacity:1;}

/* discord presence row */
.dc-row{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:16px;
  padding:10px 16px 10px 10px;
  backdrop-filter:blur(24px);
  margin-bottom:24px;min-width:240px;max-width:320px;
  opacity:0;transform:translateY(8px);
  transition:opacity .5s ease,transform .5s ease;
  box-shadow:0 8px 32px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.04);
}
.dc-row.visible{opacity:1;transform:translateY(0);}
.dc-row.gone{display:none;}

.dc-av-wrap{position:relative;flex-shrink:0;}
.dc-av{width:42px;height:42px;border-radius:50%;object-fit:cover;display:block;border:1.5px solid rgba(255,255,255,0.1);}
.dc-av-fb{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#0d1a3a,#2a4a8a);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#8899cc;}
.dc-dot{position:absolute;bottom:-1px;right:-1px;width:12px;height:12px;border-radius:50%;background:#636b75;border:2.5px solid rgba(0,0,0,0.8);transition:background .4s;}

.dc-info{flex:1;min-width:0;}
.dc-name-row{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
.dc-uname{font-size:13px;font-weight:600;color:#fff;}
.dc-badge{font-size:8px;font-weight:600;letter-spacing:1.5px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.35);text-transform:uppercase;}
.dc-activity{font-size:11px;color:rgba(255,255,255,0.38);font-weight:300;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* game/app icon in presence */
.dc-game-icon{
  width:46px;height:46px;border-radius:10px;flex-shrink:0;
  background:rgba(255,255,255,0.05);
  display:none;align-items:center;justify-content:center;
  overflow:hidden;
}
.dc-game-icon.show{display:flex;}
.dc-game-icon img{width:100%;height:100%;object-fit:cover;border-radius:10px;}

/* platform tags row */
.dc-tags{
  display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;
}
.dc-tag{
  display:flex;align-items:center;gap:4px;
  padding:2px 7px;border-radius:5px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  font-size:9px;font-weight:500;letter-spacing:.5px;
  color:rgba(255,255,255,0.5);
}
.dc-tag img{width:10px;height:10px;object-fit:contain;filter:brightness(2);}

/* socials — soft pill style */
.socials{display:flex;align-items:center;gap:14px;margin-bottom:28px;}
.soc-btn{
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,0.38);text-decoration:none;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(8px);
  transition:all .25s ease;
}
.soc-btn:hover{color:#fff;transform:translateY(-4px);border-color:rgba(180,140,255,0.3);background:rgba(140,100,255,0.1);box-shadow:0 8px 24px rgba(120,80,220,0.2);}
.soc-btn svg{width:19px;height:19px;}

.views{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,0.18);font-weight:300;}
.views svg{width:13px;height:13px;}

/* stagger */
#main > *{opacity:0;transform:translateY(14px);transition:opacity .65s ease,transform .65s ease;}
#main.show > *:nth-child(1){transition-delay:.05s}
#main.show > *:nth-child(2){transition-delay:.12s}
#main.show > *:nth-child(3){transition-delay:.19s}
#main.show > *:nth-child(4){transition-delay:.26s}
#main.show > *:nth-child(5){transition-delay:.33s}
#main.show > *:nth-child(6){transition-delay:.40s}
#main.show > *{opacity:1;transform:translateY(0);}

.inspired{
  font-size:9px;font-weight:300;letter-spacing:2px;
  color:rgba(255,255,255,0.1);
  margin-top:10px;
}
.inspired a{color:rgba(255,255,255,0.18);text-decoration:none;transition:color .2s;}
.inspired a:hover{color:rgba(255,255,255,0.5);}
</style>
</head>

<script>
/* CURSOR */
const cur=document.getElementById('cur');
const trail=document.getElementById('cur-trail');
document.addEventListener('mousemove',e=>{
  cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';
  setTimeout(()=>{trail.style.left=e.clientX+'px';trail.style.top=e.clientY+'px';},90);
});

/* SOUND */
let muted=false;
const vid=document.getElementById('videobg');
function toggleSound(){
  muted=!muted;vid.muted=muted;
  document.getElementById('icon-muted').style.display=muted?'block':'none';
  document.getElementById('icon-unmuted').style.display=muted?'none':'block';
}

/* STATUS */
const S_COL={online:'#43d9a2',idle:'#f0b232',dnd:'#f04747',offline:'#636b75'};
const S_LBL={online:'ONLINE',idle:'IDLE',dnd:'DND',offline:'OFFLINE'};
const S_TCOL={online:'rgba(67,217,162,0.8)',idle:'rgba(240,178,50,0.8)',dnd:'rgba(240,71,71,0.8)',offline:'rgba(255,255,255,0.28)'};

function setStatus(s){
  const col=S_COL[s]||S_COL.offline;
  document.getElementById('av-dot').style.background=col;
  document.getElementById('dc-dot').style.background=col;
  const b=document.getElementById('dc-badge');
  b.textContent=S_LBL[s]||'OFFLINE';
  b.style.color=S_TCOL[s]||S_TCOL.offline;
}

function setFavicon(url){
  const c=document.createElement('canvas');c.width=64;c.height=64;
  const ctx=c.getContext('2d');
  const img=new Image();img.crossOrigin='anonymous';
  img.onload=()=>{
    ctx.beginPath();ctx.arc(32,32,32,0,Math.PI*2);ctx.clip();
    ctx.drawImage(img,0,0,64,64);
    const l=document.getElementById('fav')||document.createElement('link');
    l.id='fav';l.rel='icon';l.type='image/png';l.href=c.toDataURL();
    document.head.appendChild(l);
  };img.src=url;
}

function setAvatarEverywhere(url){
  const pairs=[['av-img','av-fb'],['loader-av','loader-fb'],['dc-av','dc-av-fb']];
  pairs.forEach(([imgId,fbId])=>{
    const img=document.getElementById(imgId);
    const fb=document.getElementById(fbId);
    if(!img)return;
    img.src=url;
    img.onload=()=>{img.style.display='block';if(fb)fb.style.display='none';};
  });
  setFavicon(url);
}

/* ── DISCORD BADGES ── */
const BADGE_MAP = {
  'staff':                    {url:'https://cdn.discordapp.com/badge-icons/5e74e9b61934fc1f67c65515d1f7e60d.png', tip:'Discord Staff'},
  'partner':                  {url:'https://cdn.discordapp.com/badge-icons/3f9748e53446a137a052f3454e2de41e.png', tip:'Partnered Server Owner'},
  'hypesquad':                {url:'https://cdn.discordapp.com/badge-icons/bf01d1073931f921909045f3a39fd264.png', tip:'HypeSquad Events'},
  'bug_hunter_level_1':       {url:'https://cdn.discordapp.com/badge-icons/2717692c7dca7289b35297368a940dd0.png', tip:'Bug Hunter'},
  'bug_hunter_level_2':       {url:'https://cdn.discordapp.com/badge-icons/848f79194d4be5ff5f81505cbd0ce1e6.png', tip:'Bug Hunter (Gold)'},
  'hypesquad_online_house_1': {url:'https://cdn.discordapp.com/badge-icons/8a88d63823d8a71cd5e390baa45efa02.png', tip:'HypeSquad Bravery'},
  'hypesquad_online_house_2': {url:'https://cdn.discordapp.com/badge-icons/011940fd013082d99d0e8c8b38737f5d.png', tip:'HypeSquad Brilliance'},
  'hypesquad_online_house_3': {url:'https://cdn.discordapp.com/badge-icons/3aa41de486fa12454c3761e8e223442e.png', tip:'HypeSquad Balance'},
  'early_supporter':          {url:'https://cdn.discordapp.com/badge-icons/7060786766c9c840eb3019e725d2b358.png', tip:'Early Supporter'},
  'verified_developer':       {url:'https://cdn.discordapp.com/badge-icons/6df5892e0f35b051f8b61eace34f4967.png', tip:'Early Verified Bot Developer'},
  'active_developer':         {url:'https://cdn.discordapp.com/badge-icons/6bdc42827a38498929a4920da12695d9.png', tip:'Active Developer'},
  'premium':                  {url:'https://cdn.discordapp.com/badge-icons/2ba85e8026a8614b640c2837bcdfe21b.png', tip:'Nitro'},
  'nitro':                    {url:'https://cdn.discordapp.com/badge-icons/2ba85e8026a8614b640c2837bcdfe21b.png', tip:'Nitro'},
  'guild_booster_lvl1':       {url:'https://cdn.discordapp.com/badge-icons/51040c70d4f20a921ad6674ff06a76b1.png', tip:'Server Boosting'},
  'guild_booster_lvl6':       {url:'https://cdn.discordapp.com/badge-icons/df199d2050d3ed4ebf84d64ae83989f8.png', tip:'Server Boosting Lvl 6'},
  'guild_booster_lvl9':       {url:'https://cdn.discordapp.com/badge-icons/8976122b3c1a2cd2d3bca5e677fe8a84.png', tip:'Server Boosting Lvl 9'},
};

function renderBadges(flags){
  const row = document.getElementById('badges-row');
  if(!flags){ row.style.display='none'; return; }
  const flagBits = {
    staff:1, partner:2, hypesquad:4, bug_hunter_level_1:8,
    hypesquad_online_house_1:64, hypesquad_online_house_2:128,
    hypesquad_online_house_3:256, early_supporter:512,
    bug_hunter_level_2:16384, verified_developer:131072,
    active_developer:4194304,
  };
  // also check string array form from Lanyard
  const active=[];
  if(typeof flags === 'number'){
    for(const [key,bit] of Object.entries(flagBits)){
      if(flags & bit) active.push(key);
    }
  } else if(Array.isArray(flags)){
    active.push(...flags);
  }
  // check premium_type for nitro
  row.innerHTML='';
  active.forEach(key=>{
    const b=BADGE_MAP[key];
    if(!b)return;
    const el=document.createElement('div');
    el.className='badge-icon'; el.setAttribute('data-tip',b.tip);
    const img=document.createElement('img');
    img.src=b.url; img.alt=b.tip;
    el.appendChild(img); row.appendChild(el);
  });
  if(active.length===0) row.style.display='none';
}

function applyPresence(data){
  if(!data)return;
  if(data.discord_user?.avatar){
    const url=`https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.webp?size=256`;
    setAvatarEverywhere(url);
  }
  if(data.decoration){
    const dec=document.getElementById('av-decoration');
    dec.src=data.decoration;dec.style.display='block';
    // also show in loader
    const loaderDec=document.getElementById('loader-decoration');
    if(loaderDec){loaderDec.src=data.decoration;loaderDec.style.display='block';}
  }
  setStatus(data.discord_status||'offline');
  const uname=data.discord_user?.global_name||data.discord_user?.username||'samplaysz';
  document.getElementById('dc-uname').textContent=uname;

  // badges — Lanyard returns public_flags on discord_user
  const flags = data.discord_user?.public_flags ?? data.discord_user?.flags ?? null;
  renderBadges(flags);
  // also handle nitro via premium_type
  if(data.discord_user?.premium_type && data.discord_user.premium_type > 0){
    const row=document.getElementById('badges-row');
    const b=BADGE_MAP['nitro'];
    if(b && !row.querySelector('[data-tip="Nitro"]')){
      const el=document.createElement('div');
      el.className='badge-icon';el.setAttribute('data-tip',b.tip);
      const img=document.createElement('img');img.src=b.url;img.alt=b.tip;
      el.appendChild(img);row.appendChild(el);
    }
  }

  updateActivity(data);
}

function updateActivity(data){
  const acts=data.activities||[];
  const act=acts.find(a=>a.type===0)||acts.find(a=>a.type===2)||acts[0];
  const row=document.getElementById('dc-row');
  const tmap={0:'Playing',1:'Streaming',2:'Listening to',3:'Watching',5:'Competing in'};
  const iconEl=document.getElementById('dc-game-icon');
  const tagsEl=document.getElementById('dc-tags');

  iconEl.classList.remove('show'); iconEl.innerHTML='';
  tagsEl.innerHTML='';

  if(act){
    row.classList.remove('gone');
    setTimeout(()=>row.classList.add('visible'),300);
    document.getElementById('dc-activity').textContent=`${tmap[act.type]||'Playing'} ${act.name||''}`;

    // game/app icon
    if(act.application_id && act.assets?.large_image){
      const img=document.createElement('img');
      img.src=`https://cdn.discordapp.com/app-assets/${act.application_id}/${act.assets.large_image}.webp?size=64`;
      img.onerror=()=>{ iconEl.classList.remove('show'); };
      iconEl.appendChild(img); iconEl.classList.add('show');
    }

    // platform tag (e.g. Xbox, PlayStation, Steam)
    if(act.platform){
      const PLAT={
        'xbox':    {color:'#107c10',label:'Xbox'},
        'ps4':     {color:'#003791',label:'PlayStation'},
        'ps5':     {color:'#003791',label:'PlayStation'},
        'samsung': {color:'#1428a0',label:'Samsung'},
        'ios':     {color:'#555',label:'iOS'},
        'android': {color:'#3ddc84',label:'Android'},
        'desktop': {color:'#5865f2',label:'Desktop'},
        'web':     {color:'#5865f2',label:'Web'},
      };
      const p=PLAT[act.platform.toLowerCase()]||{color:'#555',label:act.platform};
      const tag=document.createElement('div');
      tag.className='dc-tag';
      tag.innerHTML=`<span style="width:6px;height:6px;border-radius:50%;background:${p.color};display:inline-block;"></span>${p.label}`;
      tagsEl.appendChild(tag);
    }

    // state tag (e.g. "In a Party · 2 of 4")
    if(act.state && act.type===0){
      const tag=document.createElement('div');
      tag.className='dc-tag';
      tag.textContent=act.state;
      tagsEl.appendChild(tag);
    }

  } else if(data.discord_status&&data.discord_status!=='offline'){
    row.classList.remove('gone');
    setTimeout(()=>row.classList.add('visible'),300);
    document.getElementById('dc-activity').textContent='Doing Nothing';
  } else {
    row.classList.add('gone');row.classList.remove('visible');
  }
}

/* ── SPLASH INIT ── */
setTimeout(()=>{
  document.getElementById('splash').classList.add('ready');
  document.querySelectorAll('.spl-orb').forEach(o=>o.classList.add('show'));
},120);

/* ── STEP 1: ENTER ── */
function enterSplash(){
  // fullscreen
  const el=document.documentElement;
  if(el.requestFullscreen)el.requestFullscreen();
  else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();

  // just hide splash, go to intro — NO bg video yet
  document.getElementById('splash').classList.add('out');
  setTimeout(showIntro,900);
}

/* ── STEP 2: INTRO VIDEO ── */
function showIntro(){
  const screen=document.getElementById('intro-screen');
  const introVid=document.getElementById('intro-vid');
  screen.classList.add('show');
  requestAnimationFrame(()=>requestAnimationFrame(()=>screen.classList.add('fade-in')));

  // play intro video with full sound
  introVid.muted=false;
  introVid.volume=1;
  introVid.play();

  // progress bar synced to video duration
  introVid.onloadedmetadata=()=>{
    const dur=introVid.duration*1000;
    const bar=document.getElementById('intro-bar');
    bar.style.transition=`width ${dur}ms linear`;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ bar.style.width='100%'; }));
  };

  introVid.onended=()=>finishIntro();
}

function skipIntro(){
  const introVid=document.getElementById('intro-vid');
  introVid.pause();
  finishIntro();
}

function finishIntro(){
  const screen=document.getElementById('intro-screen');
  screen.classList.add('fade-out');
  setTimeout(()=>{ screen.style.display='none'; showLoader(); },800);
}

/* ── STEP 3: IDENTITY REVEAL ── */
function spawnParticles(){
  const loader=document.getElementById('loader');
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='rv-particle';
    const size=Math.random()*3+1;
    p.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;animation-duration:${Math.random()*8+6}s;animation-delay:${Math.random()*6}s;opacity:${Math.random()*0.4+0.1}`;
    loader.appendChild(p);
  }
}

function revealNameChars(){
  const chars=document.querySelectorAll('.rv-name-char');
  chars.forEach((c,i)=>{
    setTimeout(()=>{
      c.style.opacity=1;
      c.style.transform='translateY(0) rotateX(0deg)';
    },400+i*120);
  });
}

function showLoader(){
  const loader=document.getElementById('loader');
  loader.classList.add('show');
  spawnParticles();
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    loader.classList.add('fade-in');
    setTimeout(revealNameChars, 400);
    setTimeout(()=>document.getElementById('rv-bar').classList.add('go'), 600);
  }));

  // cycle HUD status text
  const statuses=['connecting...','fetching profile...','loading presence...','syncing discord...','almost there...'];
  let si=0;
  const hudTxt=document.getElementById('hud-status');
  const rvTxt=document.getElementById('rv-status-txt');
  const cycleStatus=()=>{
    hudTxt.textContent=statuses[si];
    rvTxt.textContent=statuses[si];
    si=(si+1)%statuses.length;
  };
  cycleStatus();
  const statusInt=setInterval(cycleStatus,700);

  loadPresenceOnce()
    .then(()=>{
      clearInterval(statusInt);
      hudTxt.textContent='online';
      rvTxt.textContent='profile loaded ✦';
      setTimeout(goToMain,600);
    })
    .catch(()=>{ clearInterval(statusInt); setTimeout(goToMain,3400); });
}

/* ── STEP 4: MAIN BIO ── */
function goToMain(){
  const loader=document.getElementById('loader');
  loader.classList.add('fade-out');
  setTimeout(()=>{
    loader.style.display='none';
    // NOW start bg video with sound
    vid.muted=false;
    vid.volume=0.35;
    vid.play();
    muted=false;
    document.getElementById('icon-muted').style.display='none';
    document.getElementById('icon-unmuted').style.display='block';
    document.getElementById('sound-btn').classList.add('show');
    document.getElementById('main').classList.add('show');
    startWebSocket();
  },800);
}

/* ── PRESENCE FETCH ── */
async function loadPresenceOnce(){
  const res=await fetch('/api/presence');
  const json=await res.json();
  applyPresence({...json.data,decoration:json.decoration});
}

/* ── WEBSOCKET REAL-TIME ── */
function startWebSocket(){
  const ws=new WebSocket('wss://api.lanyard.rest/socket');
  let hb;
  ws.onopen=()=>ws.send(JSON.stringify({op:2,d:{subscribe_to_id:'864213870494220341'}}));
  ws.onmessage=e=>{
    const msg=JSON.parse(e.data);
    if(msg.op===1){hb=setInterval(()=>ws.send(JSON.stringify({op:3})),msg.d.heartbeat_interval);}
    if(msg.op===0){if(msg.d.discord_status)setStatus(msg.d.discord_status);if(msg.d.activities!==undefined)updateActivity(msg.d);}
  };
  ws.onclose=()=>{clearInterval(hb);setTimeout(startWebSocket,3000);};
}

/* ── VIEW COUNT ── */
async function loadViews(){
  try{
    const r=await fetch('https://api.counterapi.dev/v1/samplaysz-bio/views/up');
    const d=await r.json();
    document.getElementById('view-count').textContent=d.count?.toLocaleString()||'1';
  }catch(e){document.getElementById('view-count').textContent='1';}
}
loadViews();
</script>
